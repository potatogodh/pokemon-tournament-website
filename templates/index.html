<!DOCTYPE html>
<html>
<head>
    <title>Pokémon Tournament</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: url('https://wallpapercave.com/wp/wp2757874.gif');
            background-size: cover;
            background-attachment: fixed;
            color: #fff;
            margin: 0;
        }

        header {
            background: rgba(0,0,0,0.7);
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #FFD700;
        }

        h1 {
            margin: 0;
            font-size: 40px;
            text-shadow: 0 0 10px #FFD700;
        }

        .round-info {
            margin-top: 10px;
            font-size: 22px;
            font-weight: bold;
            color: #FFD700;
        }

        .layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            padding: 20px;
        }

        .match-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
        }

        .card {
            background: rgba(0,0,0,0.75);
            padding: 20px;
            border-radius: 15px;
            width: 260px;
            border: 2px solid #4CAF50;
            box-shadow: 0 0 20px rgba(76,175,80,0.7);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 150px;
        }

        .name {
            font-size: 22px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #4CAF50;
        }

        .stats {
            text-align: left;
            margin-top: 10px;
            font-size: 14px;
        }

        .stats div {
            margin: 3px 0;
        }

        .card button {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
            font-size: 16px;
            border-radius: 10px;
            border: none;
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }

        .card button:hover {
            background: #45a049;
        }

        .bracket {
            background: rgba(0,0,0,0.75);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #FFD700;
            max-height: 80vh;
            overflow-y: auto;
        }

        .round-block {
            margin-bottom: 15px;
        }

        .round-title {
            font-weight: bold;
            margin-bottom: 5px;
            color: #FFD700;
        }

        .match-line {
            font-size: 14px;
            margin-left: 10px;
        }

        .champion {
            margin-top: 20px;
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 10px #FFD700;
        }
    </style>
</head>

<body>

<header>
    <h1>Pokémon Tournament</h1>
    <div class="round-info" id="round-info"></div>
</header>

<div class="layout">
    <div>
        <div id="match" class="match-container"></div>
        <div id="champion" class="champion"></div>
    </div>

    <div class="bracket">
        <h2>Bracket</h2>
        <div id="bracket-view"></div>
    </div>
</div>

        };

        if (fixes[n]) n = fixes[n];

        return `https://play.pokemonshowdown.com/sprites/gen5/${n}.png`;
    }

    // Fake stats (consistent)
    function getStats(name) {
        const base = name.length * 7;
        return {
            hp: 50 + (base % 51),
            attack: 50 + (base % 61),
            defense: 40 + (base % 51),
            speed: 40 + (base % 61)
        };
    }

        document.getElementById("round-info").innerText =

    }
